<header class="header" [class.scrolled]="scrolled()">
  <div class="container header__inner">
    <a routerLink="/" class="logo" (click)="closeMenu()">
      <span class="logo__name">Anna Pylypchuk</span>
      <span class="logo__sub">Makeup Artist</span>
    </a>

    <nav class="nav" [class.nav--open]="menuOpen()">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="nav__link" (click)="closeMenu()">Home</a>
      <a routerLink="/about" routerLinkActive="active" class="nav__link" (click)="closeMenu()">About</a>
      <a routerLink="/services" routerLinkActive="active" class="nav__link" (click)="closeMenu()">Services</a>
      <a routerLink="/contacts" routerLinkActive="active" class="nav__link" (click)="closeMenu()">Contacts</a>
    </nav>

    <a routerLink="/contacts" class="btn btn--outline header__cta" (click)="closeMenu()">Book now</a>

    <button class="burger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
